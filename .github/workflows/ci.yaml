name: CI

on:
  push:
    branches: [main]

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: make install-dev

      - name: Format check
        run: make format

      - name: Lint
        run: make lint

      - name: Test
        run: make test